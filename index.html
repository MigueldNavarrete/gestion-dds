<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de DDs — Afi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --afi-blue: #0085CA;
  --afi-deep: #062D3F;
  --afi-gray: #C8DAE2;
  --afi-light: #F3F3F3;
  --afi-blue2: #37BBF4;
  --bg: #F3F3F3;
  --surface: #FFFFFF;
  --border: #C8DAE2;
  --text: #062D3F;
  --text-muted: #4A6B7A;
  --text-hint: #7A9BAA;
  --serif: "Roboto Serif", Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--serif); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* LOGIN */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--afi-deep);
}
.login-box {
  background: var(--surface); border-radius: 6px; padding: 2.5rem;
  width: 380px; max-width: 95vw;
}
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo img { height: 48px; }
.login-title { font-size: 16px; font-weight: 500; color: var(--afi-deep); text-align: center; margin-bottom: 1.5rem; }
.login-group { margin-bottom: 1rem; }
.login-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.login-group input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: 4px; font-family: var(--serif); font-size: 13px;
  color: var(--text); background: var(--bg); outline: none;
}
.login-group input:focus { border-color: var(--afi-blue); background: #fff; }
.login-btn {
  width: 100%; padding: 10px; background: var(--afi-blue); color: #fff;
  border: none; border-radius: 4px; font-family: var(--serif); font-size: 14px;
  font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s;
}
.login-btn:hover { background: #0070AA; }
.login-error { font-size: 12px; color: #C0392B; text-align: center; margin-top: 0.75rem; min-height: 18px; }

/* HEADER */
.header {
  background: var(--afi-deep); color: #fff;
  padding: 0 2rem; display: flex; align-items: center;
  justify-content: space-between; height: 56px;
  position: sticky; top: 0; z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo img { height: 32px; filter: brightness(0) invert(1); }
.header-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }
.header-title { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.8); letter-spacing: 0.02em; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-user { font-size: 12px; color: rgba(255,255,255,0.5); }
.btn-logout { font-family: var(--serif); font-size: 12px; padding: 4px 12px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; }
.btn-logout:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* TABS */
.tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px; }
.tab { padding: 4px 14px; border-radius: 3px; font-size: 12px; font-family: var(--serif); cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.6); transition: all 0.15s; }
.tab.active { background: rgba(255,255,255,0.15); color: #fff; }

/* MAIN */
.main { padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto; }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; border-top: 3px solid var(--afi-blue); }
.metric-label { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.metric-val { font-size: 28px; font-weight: 500; line-height: 1; color: var(--afi-deep); }
.metric-val.urgent { color: #C0392B; }

/* ALERT */
.alert { background: #FEF3CD; border: 1px solid #F0C040; border-radius: 4px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; color: #7A5200; display: flex; align-items: center; gap: 8px; }
.alert-dot { width: 6px; height: 6px; border-radius: 50%; background: #F0C040; flex-shrink: 0; }

/* CHARTS GRID */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px; }
.chart-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-hint); margin-bottom: 12px; font-weight: 500; }
.chart-wrap { position: relative; height: 160px; }

/* GANTT */
.gantt-wrap { overflow-x: auto; }
.gantt-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
.gantt-label { min-width: 100px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); }
.gantt-bar-wrap { flex: 1; background: var(--bg); border-radius: 2px; height: 18px; position: relative; overflow: hidden; }
.gantt-bar { height: 100%; border-radius: 2px; position: absolute; display: flex; align-items: center; padding: 0 4px; }
.gantt-bar span { font-size: 9px; color: #fff; white-space: nowrap; overflow: hidden; }

/* FILTERS */
.toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.toolbar input, .toolbar select { font-family: var(--serif); font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); outline: none; }
.toolbar input:focus, .toolbar select:focus { border-color: var(--afi-blue); }
.toolbar input { min-width: 180px; }
.btn { font-family: var(--serif); font-size: 12px; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.12s; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--afi-blue); color: #fff; border-color: var(--afi-blue); }
.btn-primary:hover { background: #0070AA; }

/* KANBAN */
.kanban { display: grid; grid-template-columns: repeat(7, minmax(170px, 1fr)); gap: 10px; overflow-x: auto; padding-bottom: 1rem; }
.kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px; min-height: 280px; }
.kanban-col-header { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--afi-blue); display: flex; align-items: center; justify-content: space-between; font-weight: 500; }
.col-count { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; font-size: 11px; }
.dd-card { border: 1px solid var(--border); border-radius: 4px; padding: 10px; margin-bottom: 7px; cursor: pointer; background: var(--bg); transition: border-color 0.12s, box-shadow 0.12s; }
.dd-card:hover { border-color: var(--afi-blue); box-shadow: 0 2px 8px rgba(0,133,202,0.1); }
.dd-card.urgent { border-left: 3px solid #C0392B; }
.dd-card-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; line-height: 1.3; color: var(--afi-deep); }
.dd-card-row { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.dd-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 2px; font-weight: 500; letter-spacing: 0.03em; }
.tag-apa { background: #D6EAF7; color: #0C3D5E; }
.tag-spa { background: #D5F0E5; color: #0A4226; }
.tag-urgent { background: #FADBD8; color: #922B21; }
.toque-date { font-size: 10px; color: #C0392B; margin-top: 4px; }

/* TABLE */
.table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-hint); border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--afi-deep); color: #fff; font-weight: 400; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
tr.urgent-row td:first-child { border-left: 3px solid #C0392B; }
.status-pill { font-size: 11px; padding: 3px 8px; border-radius: 2px; white-space: nowrap; font-weight: 500; }
.edit-btn { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; cursor: pointer; font-family: var(--serif); font-size: 11px; color: var(--text-muted); transition: all 0.12s; }
.edit-btn:hover { border-color: var(--afi-blue); color: var(--afi-blue); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(6,45,63,0.65); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border-radius: 6px; width: 620px; max-width: 96vw; max-height: 88vh; overflow-y: auto; border-top: 4px solid var(--afi-blue); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 15px; font-weight: 500; color: var(--afi-deep); }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 22px; line-height: 1; }
.modal-close:hover { color: var(--afi-deep); }
.modal-body { padding: 1.25rem 1.5rem; }
.form-section { margin-bottom: 1.25rem; }
.form-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--afi-blue); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--afi-gray); font-weight: 500; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 11px; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea { font-family: var(--serif); font-size: 12px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.12s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--afi-blue); background: #fff; }
.form-group textarea { resize: vertical; min-height: 64px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--border); align-items: center; }
.btn-danger { color: #922B21; border-color: #F5B7B1; }
.btn-danger:hover { background: #FADBD8; }
.saving-msg { font-size: 11px; color: var(--text-hint); }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; height: 200px; font-size: 13px; color: var(--text-hint); gap: 10px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--afi-blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1100px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(3,1fr); } .main { padding: 1rem; } }
</style>
</head>

const SUPABASE_KEY = 'sb_publishable_Ptrc1ayFlWB3Qa-o85nNLw_fwChWhAH';

const STATUSES = [
  { id: 'pendiente_info',     label: 'Pendiente info',      bg: '#E8E6DF', color: '#4A4840' },

const fmt = d => d ? new Date(d + 'T12:00:00').toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'2-digit' }) : '—';
const isUrgent = d => {

  if (!ref || d.status === 'completada') return false;
  return new Date(ref) < new Date(new Date().toDateString());
};

let allDDs = [], filtered = [], currentView = 'kanban';
let charts = {};

// AUTH
let accessToken = null;

async function apiAuth(path, method = 'GET', body = null, token = null) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + (token || accessToken || SUPABASE_KEY),
    'Content-Type': 'application/json',
  };
  if (method !== 'GET' && method !== 'DELETE') headers['Prefer'] = 'return=representation';
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + path, opts);
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  if (method === 'DELETE') return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const data = await apiAuth('/auth/v1/token?grant_type=password', 'POST', { email, password: pass }, SUPABASE_KEY);
    if (!data.access_token) throw new Error('Sin token');
    accessToken = data.access_token;
    document.getElementById('header-user').textContent = email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = '';
    loadDDs();
  } catch(e) {
    errEl.textContent = 'Email o contraseña incorrectos';
  }
}

function doLogout() {
  accessToken = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = '';
  document.getElementById('login-pass').value = '';
}

// DATA
async function api(path, method = 'GET', body = null) {
  return apiAuth('/rest/v1/' + path, method, body);
}

async function loadDDs() {
  document.getElementById('view-kanban').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando DDs...</div>';
  allDDs = await api('dds?order=id.asc');
  buildFilterOptions();
  applyFilters();
}

function buildFilterOptions() {
  const resps = [...new Set(allDDs.flatMap(d => [d.resp1, d.resp2]).filter(Boolean))].sort();
  document.getElementById('filter-resp').innerHTML = '<option value="">Todo el equipo</option>' + resps.map(r => '<option>' + r + '</option>').join('');
  document.getElementById('filter-status').innerHTML = '<option value="">Todos los estados</option>' + STATUSES.map(s => '<option value="' + s.id + '">' + s.label + '</option>').join('');
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const cliente = document.getElementById('filter-cliente').value;
  const resp = document.getElementById('filter-resp').value;
  const status = document.getElementById('filter-status').value;
  filtered = allDDs.filter(d => {
    if (search && !d.nombre.toLowerCase().includes(search)) return false;
    if (cliente && d.cliente !== cliente) return false;
    if (resp && d.resp1 !== resp && d.resp2 !== resp) return false;
    if (status && d.status !== status) return false;
    return true;
  });
  renderAll();
}

function clearFilters() {
  ['search','filter-cliente','filter-resp','filter-status'].forEach(id => { document.getElementById(id).value = ''; });
  applyFilters();
}

function renderAll() {
  renderMetrics();
  renderAlerts();
  renderCharts();
  document.getElementById('header-user') && (document.getElementById('header-user').textContent = document.getElementById('header-user').textContent);
  if (currentView === 'kanban') renderKanban();
  else renderTabla();
}

function renderMetrics() {
  const urgent = allDDs.filter(isUrgent).length;
  const byS = {};
  allDDs.forEach(d => { byS[d.status] = (byS[d.status] || 0) + 1; });
  document.getElementById('metrics').innerHTML = [
    ['Total DDs', allDDs.length, false],
    ['Urgentes', urgent, urgent > 0],
    ['Pendiente info', (byS['pendiente_info']||0)+(byS['info_sin_fecha']||0), false],
    ['En proceso', (byS['qa_en_proceso']||0)+(byS['pendientes_llamada']||0), false],
    ['Pre DD / FDD', (byS['pre_dd_lista']||0)+(byS['fdd_en_curso']||0), false],
  ].map(([l,v,u]) => '<div class="metric"><div class="metric-label">'+l+'</div><div class="metric-val'+(u?' urgent':'')+'">'+v+'</div></div>').join('');
}

function renderAlerts() {
  const urgent = allDDs.filter(isUrgent);
  document.getElementById('alert-area').innerHTML = urgent.length === 0 ? '' :
    '<div class="alert"><div class="alert-dot"></div><strong>'+urgent.length+' DD'+(urgent.length>1?'s':'')+' con fecha vencida:</strong>&nbsp;'+urgent.map(d=>d.nombre).join(', ')+'</div>';
}

function renderCharts() {
  const byS = {};
  STATUSES.forEach(s => { byS[s.id] = 0; });
  allDDs.forEach(d => { if (byS[d.status] !== undefined) byS[d.status]++; });

  const byCliente = {};
  allDDs.forEach(d => { byCliente[d.cliente] = (byCliente[d.cliente]||0)+1; });

  // velocity: days between kick_off and fecha_resp_qa for completed ones
  const velocities = allDDs.filter(d => d.kick_off && d.fecha_resp_qa).map(d => {
    const diff = Math.round((new Date(d.fecha_resp_qa) - new Date(d.kick_off)) / 86400000);
    return { nombre: d.nombre.length > 12 ? d.nombre.slice(0,12)+'…' : d.nombre, dias: diff };
  }).sort((a,b) => a.dias - b.dias);

  const CHART_COLORS = ['#062D3F','#0085CA','#37BBF4','#C8DAE2','#72C971','#EE8787','#F0C040'];

  document.getElementById('charts-grid').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">DDs por fase</div>
      <div class="chart-wrap"><canvas id="chart-funnel"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Por cliente</div>
      <div class="chart-wrap"><canvas id="chart-cliente"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Velocidad del proceso (días KO→Q&A)</div>
      <div class="chart-wrap"><canvas id="chart-velocity"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Timeline de fechas clave</div>
      <div id="gantt-wrap" style="overflow-y:auto;max-height:160px"></div>
    </div>
  `;

  // Destroy old charts
  ['funnel','cliente','velocity'].forEach(k => { if (charts[k]) { charts[k].destroy(); delete charts[k]; } });

  // Chart 1: Funnel bar
  charts.funnel = new Chart(document.getElementById('chart-funnel'), {
    type: 'bar',
    data: {
      labels: STATUSES.map(s => s.label.length > 14 ? s.label.slice(0,14)+'…' : s.label),
      datasets: [{ data: STATUSES.map(s => byS[s.id]||0), backgroundColor: '#0085CA', borderRadius: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9, family: 'Roboto Serif' }, color: '#7A9BAA' }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: '#7A9BAA', stepSize: 1 }, grid: { color: '#E8E6E0' } }
      }
    }
  });

  // Chart 2: Donut by cliente
  const clienteKeys = Object.keys(byCliente);
  charts.cliente = new Chart(document.getElementById('chart-cliente'), {
    type: 'doughnut',
    data: {
      labels: clienteKeys,
      datasets: [{ data: clienteKeys.map(k => byCliente[k]), backgroundColor: CHART_COLORS.slice(0, clienteKeys.length), borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: 'Roboto Serif' }, color: '#062D3F', boxWidth: 12, padding: 8 } } },
      cutout: '60%'
    }
  });

  // Chart 3: Velocity horizontal bar
  charts.velocity = new Chart(document.getElementById('chart-velocity'), {
    type: 'bar',
    data: {
      labels: velocities.length ? velocities.map(v => v.nombre) : ['Sin datos'],
      datasets: [{ data: velocities.length ? velocities.map(v => v.dias) : [0], backgroundColor: '#062D3F', borderRadius: 2 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9 }, color: '#7A9BAA' }, grid: { color: '#E8E6E0' } },
        y: { ticks: { font: { size: 9, family: 'Roboto Serif' }, color: '#7A9BAA' }, grid: { display: false } }
      }
    }
  });

  // Chart 4: Gantt
  const ganttDDs = allDDs.filter(d => d.kick_off).slice(0, 10);
  if (!ganttDDs.length) { document.getElementById('gantt-wrap').innerHTML = '<div style="font-size:12px;color:#7A9BAA;padding:1rem">Sin datos de fechas</div>'; return; }
  const allDates = ganttDDs.flatMap(d => [d.kick_off, d.fecha_resp_qa, d.fecha_objetivo_toque].filter(Boolean));
  const minD = new Date(Math.min(...allDates.map(d => new Date(d))));
  const maxD = new Date(Math.max(...allDates.map(d => new Date(d))));
  const totalMs = maxD - minD || 1;

  const ganttHTML = ganttDDs.map(d => {
    const start = new Date(d.kick_off);
    const end = d.fecha_resp_qa ? new Date(d.fecha_resp_qa) : (d.fecha_objetivo_toque ? new Date(d.fecha_objetivo_toque) : new Date());
    const left = Math.max(0, ((start - minD) / totalMs) * 100);
    const width = Math.max(2, ((end - start) / totalMs) * 100);
    const color = d.status === 'completada' ? '#72C971' : isUrgent(d) ? '#EB5656' : '#0085CA';
    return '<div class="gantt-item"><div class="gantt-label" title="'+d.nombre+'">'+d.nombre+'</div>' +
      '<div class="gantt-bar-wrap"><div class="gantt-bar" style="left:'+left.toFixed(1)+'%;width:'+width.toFixed(1)+'%;background:'+color+'">' +
      '<span>'+fmt(d.kick_off)+'</span></div></div></div>';
  }).join('');
  document.getElementById('gantt-wrap').innerHTML = ganttHTML;
}

function setView(v) {
  currentView = v;
  document.getElementById('tab-kanban').className = 'tab' + (v === 'kanban' ? ' active' : '');
  document.getElementById('tab-tabla').className = 'tab' + (v === 'tabla' ? ' active' : '');
  document.getElementById('view-kanban').style.display = v === 'kanban' ? '' : 'none';
  document.getElementById('view-tabla').style.display = v === 'tabla' ? '' : 'none';
  renderAll();
}

function renderKanban() {
  const cols = STATUSES.map(s => {
    const cards = filtered.filter(d => d.status === s.id);
    return '<div class="kanban-col"><div class="kanban-col-header"><span>'+s.label+'</span><span class="col-count">'+cards.length+'</span></div>' +
      cards.map(d => {
        const urgent = isUrgent(d);
        return '<div class="dd-card'+(urgent?' urgent':'')+'" onclick="openEdit('+d.id+')">'+
          '<div class="dd-card-name">'+d.nombre+'</div>'+
          '<div class="dd-card-row">'+d.cliente+'</div>'+
          '<div class="dd-card-row">'+(d.resp1||'')+(d.resp2?' / '+d.resp2:'')+'</div>'+
          '<div class="dd-card-tags"><span class="tag tag-'+d.tipo.toLowerCase()+'">'+d.tipo+'</span>'+(urgent?'<span class="tag tag-urgent">URGENTE</span>':'')+'</div>'+
          (d.fecha_objetivo_toque?'<div class="toque-date">↑ Toque: '+fmt(d.fecha_objetivo_toque)+'</div>':'')+
          '</div>';
      }).join('')+'</div>';
  }).join('');
  document.getElementById('view-kanban').innerHTML = '<div class="kanban">'+cols+'</div>';
}

function renderTabla() {
  const rows = filtered.map(d => {
    const s = getStatus(d.status);
    const urgent = isUrgent(d);
    const fechaRef = d.fecha_objetivo_toque || d.fecha_objetivo_qa;
    return '<tr class="'+(urgent?'urgent-row':'')+'">'+
      '<td style="font-size:11px;color:var(--text-hint)">'+d.id+'</td>'+
      '<td><strong style="font-weight:500">'+d.nombre+'</strong></td>'+
      '<td style="font-size:12px">'+d.cliente+'</td>'+
      '<td style="font-size:11px;color:var(--text-muted)">'+(d.resp1||'')+(d.resp2?'/'+d.resp2:'')+'</td>'+
      '<td><span class="tag tag-'+d.tipo.toLowerCase()+'">'+d.tipo+'</span></td>'+
      '<td style="font-size:11px;color:var(--text-muted)">'+fmt(d.kick_off)+'</td>'+
      '<td><span class="status-pill" style="background:'+s.bg+';color:'+s.color+'">'+s.label+'</span></td>'+
      '<td style="font-size:11px;'+(urgent?'color:#922B21;font-weight:500':'color:var(--text-muted)')+'">'+  (fechaRef?fmt(fechaRef):'—')+'</td>'+
      '<td style="font-size:12px;color:var(--text-muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+((d.detalle_pendientes||d.notas||'').replace(/"/g,''))+'">'+
        (d.detalle_pendientes||d.notas||'—')+'</td>'+
      '<td><button class="edit-btn" onclick="openEdit('+d.id+')">editar</button></td>'+
      '</tr>';
  }).join('');
  document.getElementById('view-tabla').innerHTML =
    '<div class="table-wrap"><table><thead><tr>'+
    ['#','Empresa','Cliente','Equipo','Tipo','Kick Off','Estado','Fecha objetivo','Pendientes',''].map(h=>'<th>'+h+'</th>').join('')+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function openNew() { showModal(null); }
function openEdit(id) { showModal(allDDs.find(d => d.id === id)); }

function showModal(dd) {
  const isNew = !dd;
  const d = dd || {};
  const sOpts = STATUSES.map(s => '<option value="'+s.id+'"'+(((d.status||'pendiente_info')===s.id)?' selected':'')+'>'+s.label+'</option>').join('');
  document.getElementById('modal-area').innerHTML =
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-header"><span class="modal-title">'+(isNew?'+ Nueva DD':d.nombre)+'</span><button class="modal-close" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
    '<div class="form-section"><div class="form-section-label">Identificación</div>'+
    '<div class="form-grid">'+
    '<div class="form-group full"><label>Empresa</label><input id="f-nombre" value="'+(d.nombre||'')+'" placeholder="Nombre de la empresa"></div>'+
    '<div class="form-group"><label>Cliente final</label><select id="f-cliente">'+
      ['Unavets','Qida','Rayan'].map(c=>'<option value="'+c+'"'+(d.cliente===c?' selected':'')+'>'+c+'</option>').join('')+
      '<option value="'+((!['Unavets','Qida','Rayan'].includes(d.cliente)&&d.cliente)?d.cliente:'Otro')+'"'+
      ((!['Unavets','Qida','Rayan'].includes(d.cliente)&&d.cliente)?' selected':'')+'>Otro</option>'+
    '</select></div>'+
    '<div class="form-group"><label>Tipo</label><select id="f-tipo"><option value="SPA"'+(d.tipo==='SPA'?' selected':'')+'>SPA</option><option value="APA"'+(d.tipo==='APA'?' selected':'')+'>APA</option></select></div>'+
    '<div class="form-group"><label>Responsable 1</label><input id="f-resp1" value="'+(d.resp1||'')+'"></div>'+
    '<div class="form-group"><label>Responsable 2</label><input id="f-resp2" value="'+(d.resp2||'')+'"></div>'+
    '<div class="form-group"><label>Kick Off</label><input type="date" id="f-kickoff" value="'+(d.kick_off||'')+'"></div>'+
    '<div class="form-group"><label>Estado actual</label><select id="f-status">'+sOpts+'</select></div>'+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-label">Proceso</div>'+
    '<div class="form-grid">'+
    '<div class="form-group"><label>Info recibida</label><select id="f-info"><option value="Sí"'+(d.info_recibida==='Sí'?' selected':'')+'>Sí</option><option value="No"'+(d.info_recibida!=='Sí'?' selected':'')+'>No</option></select></div>'+
    '<div class="form-group"><label>Fecha recepción info</label><input type="date" id="f-fecha-info" value="'+(d.fecha_info||'')+'"></div>'+
    '<div class="form-group"><label>Obj. envío Q&A</label><input type="date" id="f-obj-qa" value="'+(d.fecha_objetivo_qa||'')+'"></div>'+
    '<div class="form-group"><label>Real envío Q&A</label><input type="date" id="f-real-qa" value="'+(d.fecha_real_qa||'')+'"></div>'+
    '<div class="form-group"><label>Respuesta Q&A</label><input type="date" id="f-resp-qa" value="'+(d.fecha_resp_qa||'')+'"></div>'+
    '<div class="form-group"><label>Fecha llamada</label><input type="date" id="f-llamada" value="'+(d.fecha_llamada||'')+'"></div>'+
    '<div class="form-group"><label>Obj. toque al vendedor</label><input type="date" id="f-toque" value="'+(d.fecha_objetivo_toque||'')+'"></div>'+
    '<div class="form-group"><label>Aviso asesor</label><input id="f-asesor" value="'+(d.aviso_asesor||'')+'"></div>'+
    '<div class="form-group full"><label>Pendientes / detalle</label><textarea id="f-pendientes">'+(d.detalle_pendientes||'')+'</textarea></div>'+
    '<div class="form-group full"><label>Notas</label><textarea id="f-notas">'+(d.notas||'')+'</textarea></div>'+
    '</div></div>'+
    '<div class="form-section"><div class="form-section-label">Pre DD / FDD</div>'+
    '<div class="form-grid">'+
    '<div class="form-group"><label>Pre DD entregada</label><select id="f-predd"><option value="false"'+(!d.pre_dd?' selected':'')+'>No</option><option value="true"'+(d.pre_dd?' selected':'')+'>Sí</option></select></div>'+
    '<div class="form-group"><label>Fecha Pre DD</label><input type="date" id="f-fecha-predd" value="'+(d.fecha_pre_dd||'')+'"></div>'+
    '<div class="form-group"><label>Continúa FDD</label><select id="f-fdd"><option value="false"'+(!d.continua_fdd?' selected':'')+'>No</option><option value="true"'+(d.continua_fdd?' selected':'')+'>Sí</option></select></div>'+
    '<div class="form-group"><label>Fecha respuesta FDD</label><input type="date" id="f-fecha-fdd" value="'+(d.fecha_resp_fdd||'')+'"></div>'+
    '</div></div>'+
    '</div>'+
    '<div class="modal-actions">'+
      (!isNew?'<button class="btn btn-danger" onclick="deleteDD('+d.id+')">Eliminar</button>':'')+
      '<span style="flex:1"></span>'+
      '<span class="saving-msg" id="saving-msg"></span>'+
      '<button class="btn" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn btn-primary" onclick="saveDD('+(d.id||'null')+', '+isNew+')">Guardar</button>'+
    '</div>'+
    '</div></div>';
}

function getVal(id) { return document.getElementById(id)?.value || null; }
function getDate(id) { const v = getVal(id); return v || null; }

async function saveDD(id, isNew) {
  const msg = document.getElementById('saving-msg');
  msg.textContent = 'Guardando...';
  const payload = {
    nombre: getVal('f-nombre'), cliente: getVal('f-cliente'), tipo: getVal('f-tipo'),
    resp1: getVal('f-resp1'), resp2: getVal('f-resp2'), kick_off: getDate('f-kickoff'),
    status: getVal('f-status'), info_recibida: getVal('f-info'), fecha_info: getDate('f-fecha-info'),
    fecha_objetivo_qa: getDate('f-obj-qa'), fecha_real_qa: getDate('f-real-qa'),
    fecha_resp_qa: getDate('f-resp-qa'), fecha_llamada: getDate('f-llamada'),
    fecha_objetivo_toque: getDate('f-toque'), aviso_asesor: getVal('f-asesor'),
    detalle_pendientes: getVal('f-pendientes'), notas: getVal('f-notas'),
    pre_dd: getVal('f-predd') === 'true', fecha_pre_dd: getDate('f-fecha-predd'),
    continua_fdd: getVal('f-fdd') === 'true', fecha_resp_fdd: getDate('f-fecha-fdd'),
  };
  try {
    if (isNew) await api('dds', 'POST', payload);
    else await api('dds?id=eq.'+id, 'PATCH', payload);
    closeModal();
    await loadDDs();
  } catch(e) { msg.textContent = 'Error al guardar: ' + e.message; }
}

async function deleteDD(id) {
  if (!confirm('¿Eliminar esta DD? Esta acción no se puede deshacer.')) return;
  try { await api('dds?id=eq.'+id, 'DELETE'); closeModal(); await loadDDs(); }
  catch(e) { alert('Error al eliminar'); }
}

function closeModal() { document.getElementById('modal-area').innerHTML = ''; }

// INIT
document.getElementById('login-screen').style.display = '';
</script>
</body>
</html>
